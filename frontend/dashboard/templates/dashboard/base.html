<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revenda de Veiculos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .badge-online { background-color: #28a745; }
        .badge-offline { background-color: #dc3545; }
        .stat-card { border-left: 4px solid; }
        .stat-card.blue { border-left-color: #0d6efd; }
        .stat-card.green { border-left-color: #198754; }
        .stat-card.orange { border-left-color: #fd7e14; }
        .btn-action { border-radius: 8px; font-weight: 500; }
        .table th { background-color: #f1f3f5; font-weight: 600; }
        .price { color: #198754; font-weight: 700; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #e9ecef; }
        .sidebar .nav-link { color: #495057; padding: 12px 20px; border-radius: 8px; margin: 2px 8px; }
        .sidebar .nav-link:hover { background-color: #e9ecef; }
        .sidebar .nav-link.active { background-color: #0d6efd; color: #fff; }
        .sidebar .nav-link i { margin-right: 8px; width: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-2">
        <a class="navbar-brand fw-bold" href="{% url 'index' %}">
            <i class="bi bi-car-front-fill me-2"></i>Revenda de Veiculos
        </a>
        <div class="d-flex align-items-center gap-3">
            <span class="badge {% if main_online %}badge-online{% else %}badge-offline{% endif %} px-3 py-2">
                <i class="bi bi-server me-1"></i>Principal :8000
            </span>
            <span class="badge {% if sales_online %}badge-online{% else %}badge-offline{% endif %} px-3 py-2">
                <i class="bi bi-shop me-1"></i>Vendas :8001
            </span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar py-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">
                            <i class="bi bi-speedometer2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'cadastrar_veiculo' %}active{% endif %}" href="{% url 'cadastrar_veiculo' %}">
                            <i class="bi bi-plus-circle"></i>Cadastrar Veiculo
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'veiculos_a_venda' %}active{% endif %}" href="{% url 'veiculos_a_venda' %}">
                            <i class="bi bi-tag"></i>A Venda
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'veiculos_vendidos' %}active{% endif %}" href="{% url 'veiculos_vendidos' %}">
                            <i class="bi bi-check-circle"></i>Vendidos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'comprar_veiculo' %}active{% endif %}" href="{% url 'comprar_veiculo' %}">
                            <i class="bi bi-cart"></i>Comprar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'webhook_pagamento' %}active{% endif %}" href="{% url 'webhook_pagamento' %}">
                            <i class="bi bi-credit-card"></i>Pagamento
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'health_check' %}active{% endif %}" href="{% url 'health_check' %}">
                            <i class="bi bi-heart-pulse"></i>Health
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 py-4 px-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
