{% extends "dashboard/base.html" %}
{% block title %}Cadastrar Veiculo{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{% url 'index' %}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h2 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Cadastrar Veiculo</h2>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="marca" class="form-label fw-semibold">Marca</label>
            <input type="text" class="form-control" id="marca" name="marca" placeholder="Ex: Toyota" required>
        </div>
        <div class="mb-3">
            <label for="modelo" class="form-label fw-semibold">Modelo</label>
            <input type="text" class="form-control" id="modelo" name="modelo" placeholder="Ex: Corolla" required>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="ano" class="form-label fw-semibold">Ano</label>
                <input type="number" class="form-control" id="ano" name="ano" placeholder="2024" min="1900" max="2030" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="cor" class="form-label fw-semibold">Cor</label>
                <input type="text" class="form-control" id="cor" name="cor" placeholder="Ex: Prata" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="preco" class="form-label fw-semibold">Preco (R$)</label>
                <input type="number" class="form-control" id="preco" name="preco" placeholder="85000.00" step="0.01" min="0" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-action px-4">
            <i class="bi bi-check-lg me-2"></i>Cadastrar
        </button>
    </form>
</div>
{% endblock %}
